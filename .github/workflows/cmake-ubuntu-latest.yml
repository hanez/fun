name: CMake for Fun on Ubuntu-Latest

on:
  push:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{github.workspace}}

    steps:
      - uses: actions/checkout@v4

      - name: Update apt
        run: sudo apt update

      - name: Upgrade apt
        run: sudo apt upgrade -y

      - name: Install dependencies
        run: sudo apt install cmake -y

      - name: Configure CMake
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DFUN_DEBUG=OFF \
          -DFUN_WITH_REPL=OFF \
          -DFUN_WITH_PCSC=OFF \
          -DFUN_WITH_LIBSQL=OFF \
          -DFUN_WITH_SQLITE=OFF \
          -DFUN_WITH_CURL=OFF \
          -DFUN_WITH_PCRE2=OFF \
          -DFUN_WITH_XML2=OFF \
          -DFUN_WITH_JSON=OFF \
          -DFUN_WITH_TCLTK=OFF \
          -DFUN_WITH_INI=OFF \
          -DFUN_WITH_NOTCURSES=OFF \
          -DFUN_WITH_CPP=OFF \
          -DFUN_WITH_OPENSSL=OFF \
          -DFUN_WITH_LIBRESSL=OFF \
          -DFUN_WITH_YAML=OFF \
          -DFUN_USE_MUSL=OFF \
          -DFUN_WITH_CPP=OFF \
          -DFUN_WITH_RUST=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target all

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{env.BUILD_TYPE}}

      - name: Run Examples
        run: ./scripts/run_examples.sh

      - name: Run Examples
        run: ./scripts/run_examples.sh math
